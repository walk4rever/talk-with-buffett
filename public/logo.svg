<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Top arc: left → top → right (counterclockwise in SVG) -->
    <path id="topArc" d="M 44,200 A 156,156 0 0,1 356,200"/>
    <!-- Bottom arc: right → bottom → left (for readable bottom text) -->
    <path id="botArc" d="M 356,200 A 156,156 0 0,1 44,200"/>

    <!-- Gold gradient for rings -->
    <radialGradient id="ringGrad" cx="50%" cy="50%" r="50%">
      <stop offset="80%" stop-color="#c8a870"/>
      <stop offset="100%" stop-color="#8b6030"/>
    </radialGradient>

    <!-- Inner glow behind central emblem -->
    <radialGradient id="centreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8ee"/>
      <stop offset="100%" stop-color="#f0e8d0"/>
    </radialGradient>
  </defs>

  <!-- ── Background circle ─────────────────────── -->
  <circle cx="200" cy="200" r="200" fill="#f8f3ea"/>

  <!-- ── Guilloche border rings ────────────────── -->
  <!-- Outermost pair: Buffett red -->
  <circle cx="200" cy="200" r="197" fill="none" stroke="#8b0000" stroke-width="3"/>
  <circle cx="200" cy="200" r="192" fill="none" stroke="#8b0000" stroke-width="1"/>
  <!-- Gold ring zone -->
  <circle cx="200" cy="200" r="187" fill="none" stroke="#c8a870" stroke-width="2.5"/>
  <circle cx="200" cy="200" r="183" fill="none" stroke="#8b6030" stroke-width="0.8"/>
  <circle cx="200" cy="200" r="179" fill="none" stroke="#c8a870" stroke-width="1.5"/>
  <circle cx="200" cy="200" r="175" fill="none" stroke="#8b6030" stroke-width="0.7"/>
  <circle cx="200" cy="200" r="171" fill="none" stroke="#c8a870" stroke-width="1.5"/>
  <circle cx="200" cy="200" r="167" fill="none" stroke="#8b6030" stroke-width="0.6"/>
  <circle cx="200" cy="200" r="164" fill="none" stroke="#c8a870" stroke-width="2"/>
  <!-- Inner red pair framing text zone -->
  <circle cx="200" cy="200" r="159" fill="none" stroke="#8b0000" stroke-width="1"/>
  <circle cx="200" cy="200" r="155" fill="none" stroke="#8b0000" stroke-width="2.5"/>

  <!-- ── Circular text ──────────────────────────── -->
  <!-- 巴菲特部落: top semicircle -->
  <text fill="#8b0000"
        font-family="'Noto Serif SC','Songti SC','STSong','SimSun',serif"
        font-size="40" font-weight="700" letter-spacing="3">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">巴菲特部落</textPath>
  </text>

  <!-- BUFFETT TRIBE: bottom semicircle -->
  <text fill="#8b0000"
        font-family="'Lora','Georgia','Times New Roman',serif"
        font-size="19" letter-spacing="7" font-weight="400">
    <textPath href="#botArc" startOffset="50%" text-anchor="middle">BUFFETT TRIBE</textPath>
  </text>

  <!-- Decorative dots at 9 & 3 o'clock -->
  <circle cx="44"  cy="200" r="4" fill="#8b0000"/>
  <circle cx="356" cy="200" r="4" fill="#8b0000"/>

  <!-- ── Inner emblem area ───────────────────────── -->
  <circle cx="200" cy="200" r="100" fill="url(#centreGlow)"/>
  <circle cx="200" cy="200" r="100" fill="none" stroke="#c8a870" stroke-width="1.5"/>
  <circle cx="200" cy="200" r="95"  fill="none" stroke="#8b6030" stroke-width="0.7"/>
  <circle cx="200" cy="200" r="90"  fill="none" stroke="#c8a870" stroke-width="1"/>

  <!-- ── Central mark: stylised "B" serif ──────── -->
  <!-- Decorative crosshair lines -->
  <line x1="200" y1="120" x2="200" y2="138" stroke="#c8a870" stroke-width="1.5"/>
  <line x1="200" y1="262" x2="200" y2="280" stroke="#c8a870" stroke-width="1.5"/>
  <line x1="120" y1="200" x2="138" y2="200" stroke="#c8a870" stroke-width="1.5"/>
  <line x1="262" y1="200" x2="280" y2="200" stroke="#c8a870" stroke-width="1.5"/>

  <!-- Large "B" letterform in Buffett red -->
  <text x="200" y="242" text-anchor="middle"
        font-family="'Lora','Garamond','Georgia',serif"
        font-size="108" fill="#8b0000" font-weight="700"
        font-style="italic">B</text>

  <!-- Small subtitle under B -->
  <text x="200" y="270" text-anchor="middle"
        font-family="'Lora','Georgia',serif"
        font-size="12" fill="#8b6030" letter-spacing="5">TRIBE</text>

  <!-- Fine rule lines flanking TRIBE -->
  <line x1="138" y1="262" x2="165" y2="262" stroke="#c8a870" stroke-width="0.8"/>
  <line x1="235" y1="262" x2="262" y2="262" stroke="#c8a870" stroke-width="0.8"/>

  <!-- ── Corner ornaments at 45° positions ─────── -->
  <!-- NW -->
  <g transform="translate(82,82) rotate(-45)">
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#c8a870" stroke-width="1"/>
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#c8a870" stroke-width="1"/>
    <circle cx="0" cy="0" r="2.5" fill="#c8a870"/>
  </g>
  <!-- NE -->
  <g transform="translate(318,82) rotate(45)">
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#c8a870" stroke-width="1"/>
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#c8a870" stroke-width="1"/>
    <circle cx="0" cy="0" r="2.5" fill="#c8a870"/>
  </g>
  <!-- SW -->
  <g transform="translate(82,318) rotate(45)">
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#c8a870" stroke-width="1"/>
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#c8a870" stroke-width="1"/>
    <circle cx="0" cy="0" r="2.5" fill="#c8a870"/>
  </g>
  <!-- SE -->
  <g transform="translate(318,318) rotate(-45)">
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#c8a870" stroke-width="1"/>
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#c8a870" stroke-width="1"/>
    <circle cx="0" cy="0" r="2.5" fill="#c8a870"/>
  </g>
</svg>
