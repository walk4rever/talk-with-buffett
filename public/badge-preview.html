<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Buffett Tribe — Badge</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f5f5f7;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 48px;
    flex-wrap: wrap;
    padding: 64px 40px;
    font-family: system-ui;
  }
  .item { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .lbl { font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: rgba(0,0,0,.35); }
  .dark { background: #000; border-radius: 20px; padding: 36px; }
</style>
</head>
<body>

<!-- ─── 360px on light ─── -->
<div class="item">
<svg xmlns="http://www.w3.org/2000/svg" width="360" height="360" viewBox="0 0 400 400">
  <defs>
    <!-- Text arcs at r=162, center (200,200) -->
    <path id="ta" d="M 38,200 A 162,162 0 0,0 362,200"/>
    <path id="ba" d="M 38,200 A 162,162 0 0,1 362,200"/>
  </defs>

  <!-- Badge background -->
  <circle cx="200" cy="200" r="192" fill="#0c0c1e"/>

  <!-- ── Outer frame ── -->
  <circle cx="200" cy="200" r="191" fill="none" stroke="#c8a060" stroke-width="2"/>
  <circle cx="200" cy="200" r="185" fill="none" stroke="#4a3208" stroke-width="0.8"/>

  <!-- Rope/pearl border -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="#c8a060" stroke-width="6.5" stroke-dasharray="6.2,4.6"/>
  <circle cx="200" cy="200" r="180" fill="none" stroke="#0c0c1e"  stroke-width="4"   stroke-dasharray="6.2,4.6" stroke-dashoffset="5.4"/>

  <!-- Motto band frame -->
  <circle cx="200" cy="200" r="173" fill="none" stroke="#4a3208" stroke-width="0.8"/>
  <circle cx="200" cy="200" r="169" fill="none" stroke="#c8a060" stroke-width="1.5"/>

  <!-- E/W ornaments — bookends between top and bottom text -->
  <text x="35"  y="206" text-anchor="middle" fill="#c8a060" font-size="13" font-family="Georgia,serif">✦</text>
  <text x="365" y="206" text-anchor="middle" fill="#c8a060" font-size="13" font-family="Georgia,serif">✦</text>

  <!-- Top motto: BUFFETT ✦ TRIBE -->
  <text fill="#d4a840" font-family="Georgia,'Times New Roman',serif" font-size="14.5" letter-spacing="5">
    <textPath href="#ta" startOffset="50%" text-anchor="middle">BUFFETT  ✦  TRIBE</textPath>
  </text>

  <!-- Bottom motto: VALOR · PATIENTIA · SAPIENTIA -->
  <text fill="#d4a840" font-family="Georgia,'Times New Roman',serif" font-size="11" letter-spacing="3.5">
    <textPath href="#ba" startOffset="50%" text-anchor="middle">VALOR  ·  PATIENTIA  ·  SAPIENTIA</textPath>
  </text>

  <!-- ── Inner field border ── -->
  <circle cx="200" cy="200" r="152" fill="none" stroke="#c8a060" stroke-width="2"/>
  <circle cx="200" cy="200" r="147" fill="none" stroke="#4a3208" stroke-width="0.8"/>
  <circle cx="200" cy="200" r="144" fill="#0c0c1e"/>
  <circle cx="200" cy="200" r="140" fill="none" stroke="#c8a060" stroke-width="0.6" opacity="0.25"/>

  <!-- ── Top inner ornament ── -->
  <text x="200" y="77" text-anchor="middle" fill="#c8a060" font-size="11" font-family="Georgia,serif" opacity="0.65">✦</text>
  <line x1="118" y1="88" x2="282" y2="88" stroke="#c8a060" stroke-width="0.7" opacity="0.4"/>

  <!-- ── Central emblem: concentric arcs (moat + tribe expanding) ── -->
  <!-- All centered at (200, 200) — the core of value investing wisdom -->
  <circle cx="200" cy="200" r="7" fill="#c8a060"/>

  <path d="M175,200 A25,25 0 0,0 225,200"
        fill="none" stroke="#c8a060" stroke-width="5.5" stroke-linecap="round"/>
  <path d="M156,200 A44,44 0 0,0 244,200"
        fill="none" stroke="#c8a060" stroke-width="4"   stroke-linecap="round"/>
  <path d="M137,200 A63,63 0 0,0 263,200"
        fill="none" stroke="#c8a060" stroke-width="3"   stroke-linecap="round" opacity="0.9"/>
  <path d="M120,200 A80,80 0 0,0 280,200"
        fill="none" stroke="#c8a060" stroke-width="2"   stroke-linecap="round" opacity="0.75"/>
  <path d="M105,200 A95,95 0 0,0 295,200"
        fill="none" stroke="#c8a060" stroke-width="1.3" stroke-linecap="round" opacity="0.5"/>

  <!-- ── Bottom section ── -->
  <line x1="118" y1="234" x2="282" y2="234" stroke="#c8a060" stroke-width="0.7" opacity="0.4"/>

  <!-- Founding year in Roman numerals -->
  <text x="200" y="251" text-anchor="middle"
        fill="#8b6820" font-family="Georgia,serif" font-size="10.5" letter-spacing="5.5">
    MCMLVI
  </text>

  <text x="200" y="270" text-anchor="middle" fill="#c8a060" font-size="10" font-family="Georgia,serif" opacity="0.45">✦</text>
</svg>
<span class="lbl">360px — hero</span>
</div>

  <line x1="118" y1="234" x2="282" y2="234" stroke="#c8a060" stroke-width="0.7" opacity="0.4"/>
  <text x="200" y="251" text-anchor="middle" fill="#8b6820" font-family="Georgia,serif" font-size="10.5" letter-spacing="5.5">MCMLVI</text>

</div>
<span class="lbl">220px — dark bg</span>
</div>

</body>
</html>
