<!doctype html>
<html>
<head>
<meta charset="UTF-8"/>
<title>Logo Preview</title>
<style>
  body { margin: 0; font-family: system-ui; }
  .row { display: flex; align-items: center; gap: 40px; padding: 48px; }
  .dark { background: #000; }
  .light { background: #f5f5f7; }
  label { font-size: 11px; letter-spacing: .06em; text-transform: uppercase; }
  .dark label { color: rgba(255,255,255,.4); }
  .light label { color: rgba(0,0,0,.4); }
  .mark { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .nav-combo { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 400; letter-spacing: -.01em; }
  .dark .nav-combo { color: rgba(255,255,255,.85); }
  .light .nav-combo { color: #1d1d1f; }
</style>
</head>
<body>

<!-- Dark (nav context) -->
<div class="row dark">
  <div class="mark">
    <svg width="34" height="26" viewBox="0 0 40 30" fill="none" style="color:rgba(255,255,255,.85)">
      <circle cx="20" cy="28" r="2.4" fill="currentColor"/>
      <path d="M13,28 A7,7 0 0,0 27,28"  stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M6,28 A14,14 0 0,0 34,28" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
      <path d="M1,28 A19,19 0 0,0 39,28" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
    </svg>
    <label>nav size</label>
  </div>

  <div class="mark">
    <svg width="80" height="60" viewBox="0 0 40 30" fill="none" style="color:rgba(255,255,255,.85)">
      <circle cx="20" cy="28" r="2.4" fill="currentColor"/>
      <path d="M13,28 A7,7 0 0,0 27,28"  stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M6,28 A14,14 0 0,0 34,28" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
      <path d="M1,28 A19,19 0 0,0 39,28" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
    </svg>
    <label>2x</label>
  </div>

  <div class="mark">
    <svg width="160" height="120" viewBox="0 0 40 30" fill="none" style="color:rgba(255,255,255,.85)">
      <circle cx="20" cy="28" r="2.4" fill="currentColor"/>
      <path d="M13,28 A7,7 0 0,0 27,28"  stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M6,28 A14,14 0 0,0 34,28" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
      <path d="M1,28 A19,19 0 0,0 39,28" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
    </svg>
    <label>4x</label>
  </div>

  <div class="mark">
    <div class="nav-combo">
      <svg width="34" height="26" viewBox="0 0 40 30" fill="none" style="color:rgba(255,255,255,.85)">
        <circle cx="20" cy="28" r="2.4" fill="currentColor"/>
        <path d="M13,28 A7,7 0 0,0 27,28"  stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M6,28 A14,14 0 0,0 34,28" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        <path d="M1,28 A19,19 0 0,0 39,28" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      Buffett Tribe
    </div>
    <label>nav lockup</label>
  </div>
</div>

<!-- Light -->

  <div class="mark">
    <svg width="34" height="26" viewBox="0 0 40 30" fill="none" style="color:#1d1d1f">

  <div class="mark">

      <circle cx="20" cy="28" r="2.4" fill="currentColor"/>
      <path d="M13,28 A7,7 0 0,0 27,28"  stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M6,28 A14,14 0 0,0 34,28" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
      <path d="M1,28 A19,19 0 0,0 39,28" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
    </svg>
    <label>4x</label>
  </div>

  <div class="mark">
    <div class="nav-combo">
      <svg width="34" height="26" viewBox="0 0 40 30" fill="none" style="color:#1d1d1f">
        <circle cx="20" cy="28" r="2.4" fill="currentColor"/>
        <path d="M13,28 A7,7 0 0,0 27,28"  stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M6,28 A14,14 0 0,0 34,28" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        <path d="M1,28 A19,19 0 0,0 39,28" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      Buffett Tribe
    </div>
    <label>light lockup</label>
  </div>
</div>

</body>
</html>
